pipeline:
  imputation: []

  scaling:
    columns:
      - "sqft_living"
      - "sqft_lot"
      - "sqft_above"
      - "sqft_basement"
      - "bathrooms"
      - "bedrooms"
      - "floors"
      - "lat"
      - "long"
      - "nearest_city_distance"
      - "bath_per_bed"
      - "sqft_living_per_room"
      - "lot_per_sqft"
      - "sqft_living_squared"
      - "bath_x_bed"

feature_reduction:
  method: "none"

modeling:
  experiment_name: "kingcounty-housing_experiments"
  tracking_uri: "sqlite:////home/wagner/MLOps/mlflow.db"
  random_seed: 10

holdout:
  test_size: 0.2
  stratify_bins: 10

cv:
  strategy: "kfold"
  n_splits: 3
  shuffle: true

optuna:
  default_trials: 3

metrics:
  primary: "rmse"
  additional:
    - "mae"
    - "r2"
    - "mape"

models:
  linear_regression:
    enabled: true
    module: "sklearn.linear_model"
    class: "LinearRegression"
    default_params: {}

  ridge:
    enabled: true
    module: "sklearn.linear_model"
    class: "Ridge"
    default_params:
      alpha: 1.0
    search_space:
      alpha:
        type: "log_float"
        low: 0.0001
        high: 10000

  decision_tree:
    enabled: true
    module: "sklearn.tree"
    class: "DecisionTreeRegressor"
    default_params:
      random_state: 42
    search_space:
      max_depth:
        type: "int"
        low: 3
        high: 20
      min_samples_split:
        type: "int"
        low: 2
        high: 50
      min_samples_leaf:
        type: "int"
        low: 1
        high: 20
      max_features:
        type: "categorical"
        choices: ["sqrt", "log2"]

  knn:
    enabled: true
    module: "sklearn.neighbors"
    class: "KNeighborsRegressor"
    default_params:
      n_neighbors: 5
      n_jobs: -1
    search_space:
      n_neighbors:
        type: "int"
        low: 3
        high: 30
      weights:
        type: "categorical"
        choices: ["uniform", "distance"]
      metric:
        type: "categorical"
        choices: ["euclidean", "manhattan", "minkowski"]
      leaf_size:
        type: "int"
        low: 10
        high: 60

  random_forest:
    enabled: true
    module: "sklearn.ensemble"
    class: "RandomForestRegressor"
    default_params:
      n_estimators: 100
      random_state: 42
      n_jobs: -1
    search_space:
      n_estimators:
        type: "int"
        low: 50
        high: 400
      max_depth:
        type: "int"
        low: 5
        high: 30
      min_samples_split:
        type: "int"
        low: 2
        high: 20
      max_features:
        type: "float"
        low: 0.2
        high: 1.0

  xgboost:
    enabled: true
    module: "xgboost"
    class: "XGBRegressor"
    default_params:
      n_estimators: 50
      random_state: 42
      verbosity: 0
      n_jobs: -1
    search_space:
      n_estimators:
        type: "int"
        low: 50
        high: 500
      max_depth:
        type: "int"
        low: 3
        high: 10
      learning_rate:
        type: "log_float"
        low: 0.01
        high: 0.5
      subsample:
        type: "float"
        low: 0.5
        high: 1.0
      colsample_bytree:
        type: "float"
        low: 0.4
        high: 1.0
      reg_alpha:
        type: "log_float"
        low: 0.00001
        high: 10

  lightgbm:
    enabled: true
    module: "lightgbm"
    class: "LGBMRegressor"
    default_params:
      n_estimators: 100
      random_state: 42
      verbosity: -1
      n_jobs: -1
    search_space:
      n_estimators:
        type: "int"
        low: 50
        high: 500
      num_leaves:
        type: "int"
        low: 20
        high: 200
      learning_rate:
        type: "log_float"
        low: 0.01
        high: 0.5
      subsample:
        type: "float"
        low: 0.5
        high: 1.0
      reg_alpha:
        type: "log_float"
        low: 0.00001
        high: 10
      colsample_bytree:
        type: "float"
        low: 0.4
        high: 1.0

ensembles:
  top_n_base_models: 3

artifacts:
  output_dir: "outputs/modeling"
  save_plots: true
  plots:
    - "residuals"
    - "predicted_vs_actual"
    - "error_distribution"
    - "feature_importance"
    - "cv_fold_comparison"
    - "learning_curve"
    - "optuna_optimization_history"
    - "optuna_param_importances"
