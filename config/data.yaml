kaggle:
  dataset: "shibumohapatra/house-price"
  file_pattern: "*.csv"
  expected_files:
    - "1553768847-housing.csv"
  expected_count: null

ingest:
  output_format: "parquet"
  compression: "snappy"
  chunk_size_rows: 50000
  convert_dtypes: true
  validate_schema: true

schema:
  required_columns:
    - "median_house_value"
    - "median_income"
    - "housing_median_age"
    - "total_rooms"
    - "total_bedrooms"
    - "population"
    - "households"
    - "longitude"
    - "latitude"
    - "ocean_proximity"