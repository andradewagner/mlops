kaggle:
  dataset: "harlfoxem/housesalesprediction"
  file_pattern: "*.csv"
  expected_files:
    - "kc_house_data.csv"
  expected_count: null

ingest:
  output_format: "parquet"
  compression: "snappy"
  chunk_size_rows: 50000
  convert_dtypes: true
  validate_schema: true

schema:
  required_columns:
    - "id"
    - "date"
    - "price"
    - "bedrooms"
    - "bathrooms"
    - "sqft_living"
    - "sqft_lot"
    - "floors"
    - "waterfront"
    - "view"
    - "condition"
    - "grade"
    - "sqft_above"
    - "sqft_basement"
    - "yr_built"
    - "yr_renovated"
    - "zipcode"
    - "lat"
    - "long"
    - "sqft_living15"
    - "sqft_lot15"